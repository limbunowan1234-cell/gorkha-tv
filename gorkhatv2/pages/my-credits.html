<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — My Credits</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-wrap { max-width: 900px; margin: 40px auto; padding: 0 48px; }
    .profile-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 28px; display: flex; gap: 20px; align-items: center; margin-bottom: 40px; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 8px; background: var(--red); display: flex; align-items: center; justify-content: center; font-family: 'Teko', sans-serif; font-size: 32px; font-weight: 700; flex-shrink: 0; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-family: 'Teko', sans-serif; font-size: 28px; }
    .profile-email { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .credit-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; display: flex; gap: 14px; align-items: center; padding: 14px; margin-bottom: 10px; }
    .credit-item img { width: 96px; height: 54px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--surface2); }
    .credit-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .credit-role { font-size: 12px; color: var(--gold); font-weight: 700; margin-bottom: 2px; }
    .credit-meta { font-size: 12px; color: var(--muted); }
    @media(max-width:600px){ .page-wrap{padding:0 16px;} }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo-svg">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 18L8.5 7L13 14L16 10L21 18H3Z" fill="white" opacity="0.95"/></svg></div>
    <div class="logo-text">
      <div class="logo-wordmark">Gorkha<em>TV</em></div>
      <div class="logo-tagline">Darjeeling in Every Frame</div>
    </div>
  </a>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="page-wrap" id="page-wrap">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script type="module">
import { databases, account, DB_ID, COLLECTION_ID, Query } from '../js/appwrite.js';

let currentUser = null;
try { currentUser = await account.get(); } catch {}

if (!currentUser) {
  document.getElementById('page-wrap').innerHTML = `
    <div style="text-align:center;padding:80px 0;">
      <div style="font-size:48px;margin-bottom:16px;">🔒</div>
      <h2 style="font-family:'Teko',sans-serif;font-size:30px;margin-bottom:8px;">Sign in to see your credits</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Verify your work and build your GorkhaTV filmography.</p>
      <a href="/" style="color:var(--red);">← Back to GorkhaTV</a>
    </div>`;
  document.getElementById('nav-right').innerHTML = `<a href="/" style="font-size:13px;color:var(--muted);">← Home</a>`;
} else {
  document.getElementById('nav-right').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:13px;color:var(--muted);">${currentUser.name}</span>
      <a href="/" style="font-size:13px;color:var(--muted);">← Home</a>
    </div>`;

  const res = await databases.listDocuments(DB_ID, COLLECTION_ID, [Query.equal('status','published'), Query.limit(100)]);
  const userName = currentUser.name.toLowerCase();
  const credits = [];
  res.documents.forEach(doc => {
    const roles = [];
    if (doc.director && doc.director.toLowerCase().includes(userName)) roles.push('Director');
    if (doc.cast && doc.cast.toLowerCase().split(',').some(c => c.trim().includes(userName))) roles.push('Cast');
    if (roles.length) credits.push({ ...doc, roles });
  });

  const initial = currentUser.name[0].toUpperCase();
  const creditsHTML = credits.length
    ? credits.map(item => `
        <div class="credit-item">
          <img src="https://img.youtube.com/vi/${item.youtube_id}/default.jpg" alt="">
          <div style="flex:1">
            <div class="credit-title">${item.title}</div>
            <div class="credit-role">⭐ ${item.roles.join(' · ')}</div>
            <div class="credit-meta">${item.category} · ${item.language||''} ${item.location?'· '+item.location:''}</div>
          </div>
          <span class="verified">✓ Verified</span>
        </div>`)
      .join('')
    : `<div class="empty">
        <div class="empty-icon">🎬</div>
        <h3>No verified credits yet</h3>
        <p style="color:var(--muted);font-size:14px;margin-bottom:16px;">When you watch content you worked on, click "I worked on this" to claim your credit.</p>
        <a href="/" style="color:var(--red);font-size:14px;">Browse GorkhaTV →</a>
      </div>`;

  document.getElementById('page-wrap').innerHTML = `
    <div class="profile-card">
      <div class="profile-avatar">${currentUser.prefs?.avatar ? `<img src="${currentUser.prefs.avatar}">` : initial}</div>
      <div>
        <div class="profile-name">${currentUser.name}</div>
        <div class="profile-email">${currentUser.email}</div>
        <div style="margin-top:10px;font-size:13px;color:var(--muted);">${credits.length} verified credit${credits.length!==1?'s':''}</div>
      </div>
    </div>
    <div style="font-family:'Teko',sans-serif;font-size:26px;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
      <span style="display:block;width:3px;height:20px;background:var(--gold);border-radius:2px;"></span>
      My Filmography
    </div>
    ${creditsHTML}
  `;
}
</script>
</body>
</html>
