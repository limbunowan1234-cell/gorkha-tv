<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GorkhaTV</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
<div class="spinner"></div>
<p style="color:var(--muted);">Signing you in...</p>
<script type="module">
import { Client, Account } from 'https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm';

const client = new Client()
  .setEndpoint('https://nyc.cloud.appwrite.io/v1')
  .setProject('6a280cbd0022eeb574a5');

const account = new Account(client);

// Wait a moment for session to establish
await new Promise(r => setTimeout(r, 1500));

try {
  const user = await account.get();
  console.log('Session OK:', user.email);
} catch(e) {
  console.log('Session error:', e);
}

window.location.replace('/');
</script>
</body>
</html>
