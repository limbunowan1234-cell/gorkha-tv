<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Signing in...</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:#080808;">
  <a href="/" class="logo-svg">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 18L8.5 7L13 14L16 10L21 18H3Z" fill="white" opacity="0.95"/></svg>
    </div>
    <div class="logo-text">
      <div class="logo-wordmark">Gorkha<em>TV</em></div>
      <div class="logo-tagline">Darjeeling in Every Frame</div>
    </div>
  </a>
  <div class="spinner"></div>
  <p style="color:#777;font-size:14px;" id="status">Signing you in...</p>
  <script>
    // Simple redirect after delay - let Appwrite handle the session via cookies
    setTimeout(function() {
      window.location.href = 'https://gorkhatv.site';
    }, 2000);
  </script>
</body>
</html>
