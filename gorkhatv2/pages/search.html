<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../logo-circle.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Search</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GorkhaTV">
  <style>
    .search-page { max-width: 1200px; margin: 0 auto; padding: 28px 48px 60px; }
    .search-hero { margin-bottom: 28px; }
    .search-hero h1 { font-family:'Teko',sans-serif; font-size:40px; margin-bottom:14px; }
    .big-search { display:flex; align-items:center; gap:12px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 18px; max-width:640px; transition:border-color 0.2s; }
    .big-search:focus-within { border-color:var(--red); }
    .big-search svg { width:20px; height:20px; opacity:0.5; flex-shrink:0; }
    .big-search input { flex:1; background:none; border:none; outline:none; color:var(--text); font-size:16px; font-family:'Inter',sans-serif; }
    .result-section { margin-bottom:36px; }
    .result-section h2 { font-family:'Teko',sans-serif; font-size:26px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .result-section h2 .count { font-size:13px; color:var(--muted); font-family:'Inter',sans-serif; font-weight:400; }
    .res-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:12px; }
    .artist-row { display:flex; flex-wrap:wrap; gap:12px; }
    .artist-mini { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:50px; padding:8px 18px 8px 8px; text-decoration:none; color:inherit; transition:border-color 0.2s; }
    .artist-mini:hover { border-color:var(--gold); }
    .artist-mini .am-photo { width:44px; height:44px; border-radius:50%; background:var(--surface2); overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Teko',sans-serif; font-size:20px; font-weight:700; color:var(--red); flex-shrink:0; }
    .artist-mini .am-photo img { width:100%; height:100%; object-fit:cover; }
    .artist-mini .am-name { font-weight:600; font-size:14px; }
    .artist-mini .am-prof { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .search-empty { text-align:center; padding:60px 20px; color:var(--muted); }
    .search-empty .empty-icon { font-size:48px; margin-bottom:14px; }
    .cat-hint { display:inline-block; background:rgba(232,25,44,0.12); color:var(--red); border:1px solid rgba(232,25,44,0.3); font-size:12px; font-weight:700; padding:3px 12px; border-radius:20px; margin-bottom:18px; text-transform:uppercase; letter-spacing:0.5px; }
    @media(max-width:600px){ .search-page{padding:20px 16px 40px;} .search-hero h1{font-size:32px;} }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo-svg"><img src="../logo-horizantal.png" alt="GorkhaTV" class="nav-logo-img"></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="browse.html?cat=movie">Movies</a></li>
    <li><a href="browse.html?cat=webseries">Web Series</a></li>
    <li><a href="artists.html">Artists</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="search-page">
  <div class="search-hero">
    <h1>Search</h1>
    <div class="big-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="Search titles, cast, director, genre, or artists..." autocomplete="off">
    </div>
  </div>
  <div id="results">
    <div class="search-empty"><div class="empty-icon">🔍</div><p>Start typing to search GorkhaTV.</p></div>
  </div>
</div>

<script type="module">
import { databases, storage, account, DB_ID, COLLECTION_ID, ARTISTS_COLLECTION_ID, BUCKET_ID, Query } from '../js/appwrite.js';

let currentUser = null;
try { currentUser = await account.get(); } catch {}
if (currentUser) {
  document.getElementById('nav-right').innerHTML = `<div class="user-avatar" style="cursor:pointer;" onclick="window.location.href='/pages/my-favourites.html'">${currentUser.name[0].toUpperCase()}</div>`;
} else {
  document.getElementById('nav-right').innerHTML = `<button class="btn-signin" onclick="loginGoogle()">Sign In</button>`;
}

const KNOWN_CATS = { movie:'movie', movies:'movie', webseries:'webseries', 'web series':'webseries', series:'webseries', music:'music', 'music video':'music', song:'music', documentary:'documentary', docs:'documentary', doc:'documentary', vlog:'vlog', vlogs:'vlog', standup:'standup', 'standup comedy':'standup', comedy:'standup', podcast:'podcast', podcasts:'podcast', prank:'prank', pranks:'prank' };

let allContent = [];
let allArtists = [];

// Preload everything once
const [cRes, aRes] = await Promise.all([
  databases.listDocuments(DB_ID, COLLECTION_ID, [Query.equal('status','published'), Query.orderDesc('publishedAt'), Query.limit(100)]),
  databases.listDocuments(DB_ID, ARTISTS_COLLECTION_ID, [Query.limit(100)])
]);
allContent = cRes.documents;
allArtists = aRes.documents;

const input = document.getElementById('q');

// Pre-fill from URL ?q=
const urlQ = new URLSearchParams(window.location.search).get('q');
if (urlQ) { input.value = urlQ; runSearch(urlQ); }
input.focus();

let debounce;
input.addEventListener('input', e => {
  clearTimeout(debounce);
  const val = e.target.value;
  debounce = setTimeout(() => {
    runSearch(val);
    const u = new URL(window.location);
    if (val.trim()) u.searchParams.set('q', val.trim()); else u.searchParams.delete('q');
    history.replaceState({}, '', u);
  }, 180);
});

function thumb(item) {
  if (item.thumbnailFileId) return storage.getFileView(BUCKET_ID, item.thumbnailFileId);
  if (item.youtube_id) return `https://img.youtube.com/vi/${item.youtube_id}/hqdefault.jpg`;
  return '';
}

function groupSeries(docs) {
  const map = {}; const order = []; const out = [];
  docs.forEach(d => {
    const sid = (d.seriesId||'').trim();
    if (sid) { if(!map[sid]){map[sid]=[];order.push(sid);} map[sid].push(d); }
    else out.push({ single:true, doc:d });
  });
  order.forEach(sid => {
    const eps = map[sid].slice().sort((a,b)=>new Date(a.publishedAt)-new Date(b.publishedAt));
    out.push({ single:false, sid, eps, doc:eps[0] });
  });
  return out;
}

function runSearch(raw) {
  const q = (raw||'').trim().toLowerCase();
  const box = document.getElementById('results');
  if (!q) {
    box.innerHTML = `<div class="search-empty"><div class="empty-icon">🔍</div><p>Start typing to search GorkhaTV.</p></div>`;
    return;
  }

  // Category detection
  const catMatch = KNOWN_CATS[q];

  // Content match: title, cast, director, category
  const contentHits = allContent.filter(d =>
    (d.title||'').toLowerCase().includes(q) ||
    (d.cast||'').toLowerCase().includes(q) ||
    (d.director||'').toLowerCase().includes(q) ||
    (d.category||'').toLowerCase().includes(q) ||
    (d.genre||'').toLowerCase().includes(q) ||
    (d.seriesName||'').toLowerCase().includes(q) ||
    (d.location||'').toLowerCase().includes(q) ||
    (d.language||'').toLowerCase().includes(q)
  );

  // Artist match: name, profession
  const artistHits = allArtists.filter(a =>
    (a.name||'').toLowerCase().includes(q) ||
    (a.profession||'').toLowerCase().includes(q) ||
    (a.genres||'').toLowerCase().includes(q) ||
    (a.languages||'').toLowerCase().includes(q) ||
    (a.location||'').toLowerCase().includes(q)
  );

  const grouped = groupSeries(contentHits);

  let html = '';

  if (catMatch) {
    html += `<a href="browse.html?cat=${catMatch}" class="cat-hint">Browse all ${catMatch} →</a><br>`;
  }

  if (!grouped.length && !artistHits.length) {
    box.innerHTML = `<div class="search-empty"><div class="empty-icon">🤷</div><p>No results for "<strong>${raw}</strong>"</p><p style="font-size:13px;margin-top:8px;">Try a title, actor, director, or genre.</p></div>`;
    return;
  }

  // Videos / Series
  if (grouped.length) {
    html += `<div class="result-section"><h2>Videos & Series <span class="count">${grouped.length}</span></h2><div class="res-grid">`;
    html += grouped.map(g => {
      const d = g.doc;
      const url = `video.html?id=${g.single ? d.$id : g.eps[0].$id}`;
      const epBadge = !g.single ? `<span class="card-ep-badge">${g.eps.length} EP${g.eps.length>1?'S':''}</span>` : '';
      return `
        <div class="card" onclick="window.location.href='${url}'">
          <div class="card-thumb">
            <img src="${thumb(d)}" alt="${d.title||''}" loading="lazy">
            <div class="card-play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24" fill="black" width="18" height="18"><path d="M8 5v14l11-7z"/></svg></div></div>
            <span class="card-cat-badge">${d.category||''}</span>
            ${epBadge}
          </div>
          <div class="card-body">
            <div class="card-title">${g.single ? (d.title||'') : (d.seriesName||d.title||'')}</div>
            <div class="card-sub">${g.single?'':'Series · '}${d.language||''} ${d.location?'· '+d.location:''}</div>
          </div>
        </div>`;
    }).join('');
    html += `</div></div>`;
  }

  // Artists
  if (artistHits.length) {
    html += `<div class="result-section"><h2>Artists <span class="count">${artistHits.length}</span></h2><div class="artist-row">`;
    html += artistHits.map(a => {
      let photo = `<span>${(a.name||'?')[0].toUpperCase()}</span>`;
      if (a.photoFiled) photo = `<img src="${storage.getFileView(BUCKET_ID, a.photoFiled)}" alt="${a.name}">`;
      return `
        <a class="artist-mini" href="artist.html?id=${encodeURIComponent(a.slug||'')}">
          <div class="am-photo">${photo}</div>
          <div>
            <div class="am-name">${a.name||''}</div>
            <div class="am-prof">${a.profession||''}</div>
          </div>
        </a>`;
    }).join('');
    html += `</div></div>`;
  }

  box.innerHTML = html;
}

window.loginGoogle = async () => {
  const { Client, Account } = await import('https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm');
  const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('6a280cbd0022eeb574a5');
  const acc = new Account(client);
  await acc.createOAuth2Token('google', 'https://gorkhatv.site/pages/auth-callback.html', 'https://gorkhatv.site');
};
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('[GorkhaTV] Service worker registered'))
        .catch((err) => console.warn('[GorkhaTV] SW registration failed', err));
    });
  }
</script>
</body>
</html>
