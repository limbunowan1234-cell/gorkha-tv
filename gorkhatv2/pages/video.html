<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../logo-circle.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Watch</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/seo.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GorkhaTV">
  <style>
    .watch-wrap { padding: 24px 48px 60px; max-width: 1200px; margin: 0 auto; }
    .watch-back { display:inline-flex; align-items:center; gap:8px; margin-bottom:18px; color:var(--text); text-decoration:none; }
    .watch-grid { display:grid; grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr); gap:24px; }
    .player-box { background:#111; border-radius:18px; overflow:hidden; aspect-ratio:16/9; }
    .player-box iframe { width:100%; height:100%; border:0; display:block; }
    .video-title { font-family:'Teko', sans-serif; font-size:46px; line-height:1; margin:18px 0 6px; }
    .video-badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .action-bar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .act-btn { display:inline-flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
    .act-btn:hover { border-color:var(--text); }
    .act-btn.liked { color:#ff4d6d; border-color:#ff4d6d; background:rgba(255,77,109,0.1); }
    .act-btn .ct { color:var(--muted); font-weight:500; }
    .vbadge { font-size:11px; font-weight:700; padding:4px 10px; border-radius:3px; text-transform:uppercase; letter-spacing:0.5px; }
    .vbadge.cat { background:var(--red); color:#fff; }
    .vbadge.series { background:rgba(200,150,42,0.18); color:var(--gold); border:1px solid rgba(200,150,42,0.35); }
    .vbadge.plain { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .detail-table { margin:18px 0; border-top:1px solid var(--border); }
    .detail-row { display:flex; gap:14px; padding:11px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .detail-label { flex:0 0 120px; color:var(--muted); font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:0.6px; padding-top:2px; }
    .detail-value { flex:1; color:var(--text); }
    .cast-chips { display:flex; flex-wrap:wrap; gap:8px; }
    .cast-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:13px; transition:all 0.15s; }
    a.cast-chip:hover { border-color:var(--gold); color:var(--gold); }
    .video-desc { color:#ddd; line-height:1.7; white-space:pre-wrap; margin-top:6px; }
    .series-box, .side-card { background:#111; border-radius:16px; padding:18px; }
    .series-box { margin-top:18px; }
    .series-box h3, .side-card h3 { margin:0 0 14px; font-family:'Teko', sans-serif; font-size:28px; }
    .episode-list { display:grid; gap:10px; }
    .episode-item { display:flex; gap:12px; padding:10px 0; text-decoration:none; color:inherit; border-top:1px solid rgba(255,255,255,.06); }
    .episode-item:first-child { border-top:0; }
    .episode-item.playing { background:rgba(196,30,58,0.1); border-radius:8px; padding:10px; }
    .episode-item img { width:132px; height:74px; object-fit:cover; border-radius:10px; flex:0 0 auto; }
    .episode-item .e-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .episode-item .e-sub { color:var(--muted); font-size:12px; }
    .related-item { display:flex; gap:12px; padding:10px 0; text-decoration:none; color:inherit; border-top:1px solid rgba(255,255,255,.06); }
    .related-item:first-child { border-top:0; }
    .related-item img { width:132px; height:74px; object-fit:cover; border-radius:10px; flex:0 0 auto; }
    .related-item .r-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .related-item .r-sub { color:var(--muted); font-size:12px; }
    .empty-note { color:var(--muted); font-size:13px; }
    .claim-box { margin-top:22px; padding:18px; background:rgba(200,150,42,0.07); border:1px solid rgba(200,150,42,0.25); border-radius:12px; }
    .claim-box h4 { font-family:'Teko',sans-serif; font-size:22px; color:var(--gold); margin-bottom:6px; }
    .claim-box p { font-size:13px; color:var(--muted); margin-bottom:14px; }
    .claim-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .claim-row select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:6px; font-family:'Inter',sans-serif; font-size:14px; }
    .claim-submit { background:var(--gold); color:#000; border:none; padding:9px 20px; border-radius:6px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity 0.2s; }
    .claim-submit:hover { opacity:0.85; }
    .claim-submit:disabled { opacity:0.5; cursor:not-allowed; }
    .claim-status { font-size:14px; padding:12px 16px; border-radius:8px; margin-top:6px; }
    .claim-status.pending { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid var(--border); }
    .claim-status.approved { background:rgba(34,197,94,0.1); color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
    @media(max-width:900px){ .watch-wrap{padding-left:16px;padding-right:16px;} .watch-grid{grid-template-columns:1fr;} .video-title{font-size:34px;} .detail-label{flex-basis:90px;} }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo-svg"><img src="../logo-horizantal.png" alt="GorkhaTV" class="nav-logo-img"></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="browse.html?cat=movie">Movies</a></li>
    <li><a href="browse.html?cat=webseries">Web Series</a></li>
    <li><a href="browse.html?cat=music">Music</a></li>
    <li><a href="browse.html?cat=documentary">Docs</a></li>
    <li><a href="browse.html?cat=vlog">Vlogs</a></li>
    <li><a href="browse.html?cat=standup">Standup</a></li>
    <li><a href="browse.html?cat=podcast">Podcasts</a></li>
    <li><a href="browse.html?cat=prank">Pranks</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="watch-wrap">
  <a href="javascript:history.back()" class="watch-back">← Back</a>
  <div id="watch-loading" class="loading"><div class="spinner"></div></div>

  <div id="watch-content" style="display:none;">
    <div class="watch-grid">
      <div>
        <div class="player-box" id="player-box"></div>
        <h1 class="video-title" id="video-title"></h1>
        <div class="video-badges" id="video-badges"></div>
        <div class="action-bar" id="action-bar"></div>
        <div class="detail-table" id="detail-table"></div>
        <div class="video-desc" id="video-desc"></div>
        <div id="claim-section"></div>

        <div class="series-box" id="series-box" style="display:none;">
          <h3 id="series-title"></h3>
          <div class="episode-list" id="episode-list"></div>
        </div>
      </div>

      <aside class="side-card">
        <h3>Related Videos</h3>
        <div id="related-list"></div>
      </aside>
    </div>
  </div>
</div>

<script type="module">
import { databases, account, DB_ID, COLLECTION_ID, CLAIMS_COLLECTION_ID, LIKES_COLLECTION_ID, ID, Query } from '../js/appwrite.js';

// ── Inlined likes helpers (no separate module, avoids load failures) ──
async function getCounts(contentId) {
  try {
    const [likeRes, shareRes] = await Promise.all([
      databases.listDocuments(DB_ID, LIKES_COLLECTION_ID, [Query.equal('contentId', contentId), Query.equal('type', 'like'), Query.limit(1)]),
      databases.listDocuments(DB_ID, LIKES_COLLECTION_ID, [Query.equal('contentId', contentId), Query.equal('type', 'share'), Query.limit(1)])
    ]);
    return { like: likeRes.total, share: shareRes.total };
  } catch (e) { console.error('getCounts failed', e); return { like: 0, share: 0 }; }
}

async function getUserLike(contentId, userId) {
  if (!userId) return null;
  try {
    const res = await databases.listDocuments(DB_ID, LIKES_COLLECTION_ID, [
      Query.equal('contentId', contentId), Query.equal('userId', userId), Query.equal('type', 'like'), Query.limit(1)
    ]);
    return res.documents[0]?.$id || null;
  } catch (e) { console.error(e); return null; }
}

async function apiToggleLike(contentId, userId) {
  const existingId = await getUserLike(contentId, userId);
  if (existingId) {
    await databases.deleteDocument(DB_ID, LIKES_COLLECTION_ID, existingId);
  } else {
    await databases.createDocument(DB_ID, LIKES_COLLECTION_ID, ID.unique(), { contentId, userId, type: 'like' });
  }
  const counts = await getCounts(contentId);
  return { liked: !existingId, count: counts.like };
}

async function recordShare(contentId, userId) {
  try {
    await databases.createDocument(DB_ID, LIKES_COLLECTION_ID, ID.unique(), { contentId, userId: userId || 'anon', type: 'share' });
  } catch (e) { console.error('share record failed', e); }
  const counts = await getCounts(contentId);
  return counts.share;
}

// ── View tracking (one view per browser per video) ──
const viewed = JSON.parse(localStorage.getItem('gtv_viewed') || '{}');
async function recordView(contentId) {
  if (!contentId || viewed[contentId]) return;
  viewed[contentId] = 1;
  localStorage.setItem('gtv_viewed', JSON.stringify(viewed));
  try {
    await databases.createDocument(DB_ID, LIKES_COLLECTION_ID, ID.unique(), { contentId, userId: currentUser?.$id || 'anon', type: 'view' });
  } catch (e) { console.error('view record failed', e); }
}

async function shareContent(title, url) {
  if (navigator.share) { try { await navigator.share({ title, url }); return true; } catch { return false; } }
  else { try { await navigator.clipboard.writeText(url); return 'copied'; } catch { return false; } }
}

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
let currentUser = null;

try { currentUser = await account.get(); } catch {}

if (currentUser) {
  document.getElementById('nav-right').innerHTML = `
    <div class="user-avatar" style="cursor:pointer;" onclick="window.location.href='/pages/my-favourites.html'">
      ${currentUser.name ? currentUser.name[0].toUpperCase() : '?'}
    </div>
  `;
} else {
  document.getElementById('nav-right').innerHTML = `<button class="btn-signin" onclick="loginGoogle()">Sign In</button>`;
}

function ytUrlFromItem(item) {
  if (item.youtube_id) {
    return `https://www.youtube.com/embed/${item.youtube_id}?rel=0&modestbranding=1&autoplay=1&mute=1`;
  }
  if (item.youtube_url) {
    const m = item.youtube_url.match(/(?:v=|youtu\.be\/|shorts\/)([A-Za-z0-9_-]{11})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}?rel=0&modestbranding=1&autoplay=1&mute=1`;
  }
  return '';
}

function esc(s) { return (s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Build a clickable chip list from a comma-separated string. Links to artist profile by slug.
function chips(str) {
  return str.split(',').map(name => {
    const n = name.trim();
    if (!n) return '';
    const slug = n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    return `<a class="cast-chip" href="artist.html?id=${encodeURIComponent(slug)}">${esc(n)}</a>`;
  }).join('');
}

async function load() {
  if (!id) {
    document.getElementById('watch-loading').innerHTML = '<p class="empty-note">Missing video ID.</p>';
    return;
  }

  try {
    const item = await databases.getDocument(DB_ID, COLLECTION_ID, id);
    const embed = ytUrlFromItem(item);

    document.title = `${item.title || 'Watch'} — GorkhaTV`;
    updateSEO(item);

    document.getElementById('player-box').innerHTML = embed
      ? `<iframe src="${embed}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
      : `<div style="padding:24px;color:#fff;">Video link missing.</div>`;

    // Count this as a view (fire-and-forget, deduped per browser)
    recordView(item.$id);

    document.getElementById('video-title').textContent = item.title || '';

    // ── Badges row ──
    const badges = [];
    if (item.category) badges.push(`<span class="vbadge cat">${esc(item.category)}</span>`);
    if (item.genre) item.genre.split(',').map(g => g.trim()).filter(Boolean).forEach(g => badges.push(`<span class="vbadge plain">${esc(g)}</span>`));
    if (item.seriesName) badges.push(`<span class="vbadge series">📺 ${esc(item.seriesName)}</span>`);
    if (item.publishedAt) badges.push(`<span class="vbadge plain">${new Date(item.publishedAt).getFullYear()}</span>`);
    document.getElementById('video-badges').innerHTML = badges.join('');

    // ── Like + Share bar (real global counts) ──
    await renderActionBar(item);

    // ── Detail table ──
    const rows = [];
    if (item.seriesName) rows.push(['Series', esc(item.seriesName)]);
    if (item.genre) rows.push(['Genre', esc(item.genre)]);
    if (item.director) rows.push(['Director', chips(item.director)]);
    if (item.cast) rows.push(['Cast', `<div class="cast-chips">${chips(item.cast)}</div>`]);
    if (item.language) rows.push(['Language', esc(item.language)]);
    if (item.location) rows.push(['Location', esc(item.location)]);
    if (item.publishedAt) rows.push(['Published', new Date(item.publishedAt).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })]);

    document.getElementById('detail-table').innerHTML = rows.map(([label, value]) => `
      <div class="detail-row">
        <div class="detail-label">${label}</div>
        <div class="detail-value">${value}</div>
      </div>
    `).join('');

    document.getElementById('video-desc').textContent = item.description || '';

    // ── Claim section ──
    await renderClaimSection(item);

    // ── Series episodes ──
    if (item.seriesId) {
      const seriesRes = await databases.listDocuments(DB_ID, COLLECTION_ID, [
        Query.equal('seriesId', item.seriesId),
        Query.equal('status', 'published'),
        Query.orderAsc('publishedAt'),
        Query.limit(50)
      ]);

      const eps = seriesRes.documents;
      if (eps.length > 1) {
        document.getElementById('series-box').style.display = 'block';
        document.getElementById('series-title').textContent = item.seriesName ? `${item.seriesName} — ${eps.length} Episodes` : `Series — ${eps.length} Episodes`;
        document.getElementById('episode-list').innerHTML = eps.map((v, i) => `
          <a class="episode-item ${v.$id === item.$id ? 'playing' : ''}" href="video.html?id=${v.$id}">
            <img src="${v.youtube_id ? `https://img.youtube.com/vi/${v.youtube_id}/hqdefault.jpg` : ''}" alt="${esc(v.title)}">
            <div>
              <div class="e-title">${i+1}. ${esc(v.title)}</div>
              <div class="e-sub">
                ${v.$id === item.$id ? '▶ Now playing' : 'Tap to play'}${v.language ? ' • ' + esc(v.language) : ''}
              </div>
            </div>
          </a>
        `).join('');
      }
    }

    // ── Related (same category, excluding current + same series) ──
    const relQueries = [Query.equal('status', 'published'), Query.limit(12)];
    if (item.category) relQueries.push(Query.equal('category', item.category));
    const rel = await databases.listDocuments(DB_ID, COLLECTION_ID, relQueries);

    const related = rel.documents
      .filter(x => x.$id !== item.$id && (!item.seriesId || x.seriesId !== item.seriesId))
      .slice(0, 6);

    document.getElementById('related-list').innerHTML = related.length
      ? related.map(v => `
        <a class="related-item" href="video.html?id=${v.$id}">
          <img src="${v.youtube_id ? `https://img.youtube.com/vi/${v.youtube_id}/hqdefault.jpg` : ''}" alt="${esc(v.title)}">
          <div>
            <div class="r-title">${esc(v.title)}</div>
            <div class="r-sub">${esc(v.category)}${v.language ? ' • ' + esc(v.language) : ''}</div>
          </div>
        </a>
      `).join('')
      : `<p class="empty-note">No related videos yet.</p>`;

    document.getElementById('watch-loading').style.display = 'none';
    document.getElementById('watch-content').style.display = 'block';
  } catch (err) {
    document.getElementById('watch-loading').innerHTML = `<p class="empty-note">Could not load video.</p>`;
    console.error(err);
  }
}

// ── Claim a credit ──
async function renderClaimSection(item) {
  const wrap = document.getElementById('claim-section');
  if (!wrap) return;

  if (!currentUser) {
    wrap.innerHTML = `
      <div class="claim-box">
        <h4>⭐ Worked on this?</h4>
        <p>Sign in to claim your credit and get verified on your artist profile.</p>
        <button class="claim-submit" onclick="loginGoogle()">Sign in to claim</button>
      </div>`;
    return;
  }

  // Check if this user already has a claim on this content
  let existing = null;
  try {
    const res = await databases.listDocuments(DB_ID, CLAIMS_COLLECTION_ID, [
      Query.equal('contentId', item.$id),
      Query.equal('userId', currentUser.$id),
      Query.limit(1)
    ]);
    existing = res.documents[0] || null;
  } catch (e) { console.error('claim check failed', e); }

  if (existing) {
    if (existing.status === 'approved') {
      wrap.innerHTML = `<div class="claim-status approved">✓ Your ${existing.claimedRole} credit is verified on this title.</div>`;
    } else if (existing.status === 'rejected') {
      wrap.innerHTML = `<div class="claim-status pending">Your claim for this title was not approved.</div>`;
    } else {
      wrap.innerHTML = `<div class="claim-status pending">⏳ Your ${existing.claimedRole} claim is pending admin review.</div>`;
    }
    return;
  }

  wrap.innerHTML = `
    <div class="claim-box">
      <h4>⭐ Worked on this?</h4>
      <p>Claim your role. An admin will verify it before it shows on your profile.</p>
      <div class="claim-row">
        <select id="claim-role">
          <option value="Actor">Actor</option>
          <option value="Director">Director</option>
          <option value="Producer">Producer</option>
          <option value="Writer">Writer</option>
          <option value="Singer">Singer</option>
          <option value="Musician">Musician</option>
          <option value="Editor">Editor</option>
          <option value="Cinematographer">Cinematographer</option>
          <option value="Crew">Crew</option>
        </select>
        <button class="claim-submit" id="claim-btn" onclick="submitClaim('${item.$id}')">Submit Claim</button>
      </div>
    </div>`;
}

window.submitClaim = async (contentId) => {
  const btn = document.getElementById('claim-btn');
  const role = document.getElementById('claim-role').value;
  if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

  try {
    // get content title for the record
    const content = await databases.getDocument(DB_ID, COLLECTION_ID, contentId);
    await databases.createDocument(DB_ID, CLAIMS_COLLECTION_ID, ID.unique(), {
      contentId,
      contentTitle: content.title || '',
      userId: currentUser.$id,
      userName: currentUser.name || '',
      userEmail: currentUser.email || '',
      claimedRole: role,
      status: 'pending'
    });
    document.getElementById('claim-section').innerHTML =
      `<div class="claim-status pending">⏳ Your ${role} claim is pending admin review.</div>`;
  } catch (e) {
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = 'Submit Claim'; }
    alert('Could not submit claim: ' + (e.message || e));
  }
};

// ── Like + Share ──
let isLikedState = false;

async function renderActionBar(item) {
  const bar = document.getElementById('action-bar');
  if (!bar) return;
  const counts = await getCounts(item.$id);
  let likedId = currentUser ? await getUserLike(item.$id, currentUser.$id) : null;
  isLikedState = !!likedId;

  bar.innerHTML = `
    <button class="act-btn ${isLikedState ? 'liked' : ''}" id="like-btn" onclick="handleLike('${item.$id}')">
      ${isLikedState ? '❤️' : '🤍'} <span id="like-label">${isLikedState ? 'Liked' : 'Like'}</span> <span class="ct" id="like-ct">${counts.like || ''}</span>
    </button>
    <button class="act-btn" onclick="handleShare('${item.$id}')">
      🔗 Share <span class="ct" id="share-ct">${counts.share || ''}</span>
    </button>`;
}

window.handleLike = async (contentId) => {
  if (!currentUser) { alert('Sign in to like.'); return; }
  const btn = document.getElementById('like-btn');
  btn.disabled = true;
  try {
    const { liked, count } = await apiToggleLike(contentId, currentUser.$id);
    isLikedState = liked;
    btn.classList.toggle('liked', liked);
    btn.querySelector('#like-label').textContent = liked ? 'Liked' : 'Like';
    btn.querySelector('#like-ct').textContent = count || '';
    btn.firstChild.textContent = liked ? '❤️ ' : '🤍 ';
  } catch (e) { alert('Error: ' + (e.message || e)); }
  btn.disabled = false;
};

window.handleShare = async (contentId) => {
  const url = window.location.href;
  const result = await shareContent(document.getElementById('video-title').textContent, url);
  // Record the share (counts even if they cancel native sheet, only on success/copy)
  if (result === true || result === 'copied') {
    const newCount = await recordShare(contentId, currentUser?.$id);
    const ct = document.getElementById('share-ct');
    if (ct) ct.textContent = newCount || '';
    if (result === 'copied') alert('Link copied to clipboard!');
  }
};

window.loginGoogle = async () => {
  const { Client, Account } = await import('https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm');
  const client = new Client()
    .setEndpoint('https://nyc.cloud.appwrite.io/v1')
    .setProject('6a280cbd0022eeb574a5');
  const acc = new Account(client);
  await acc.createOAuth2Token('google', 'https://gorkhatv.site/pages/auth-callback.html', 'https://gorkhatv.site');
};

load();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('[GorkhaTV] Service worker registered'))
        .catch((err) => console.warn('[GorkhaTV] SW registration failed', err));
    });
  }
</script>
