<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Watch</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .watch-wrap { padding: 24px 48px 60px; max-width: 1200px; margin: 0 auto; }
    .watch-back { display:inline-flex; align-items:center; gap:8px; margin-bottom:18px; color:var(--text); text-decoration:none; }
    .watch-grid { display:grid; grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr); gap:24px; }
    .player-box { background:#111; border-radius:18px; overflow:hidden; aspect-ratio:16/9; }
    .player-box iframe { width:100%; height:100%; border:0; display:block; }
    .video-title { font-family:'Teko', sans-serif; font-size:46px; line-height:1; margin:18px 0 8px; }
    .video-meta { color:var(--muted); font-size:14px; margin-bottom:16px; }
    .video-desc { color:#ddd; line-height:1.65; white-space:pre-wrap; }
    .series-box, .side-card { background:#111; border-radius:16px; padding:18px; }
    .series-box { margin-top:18px; }
    .series-box h3, .side-card h3 { margin:0 0 14px; font-family:'Teko', sans-serif; font-size:28px; }
    .episode-list { display:grid; gap:10px; }
    .episode-item { display:flex; gap:12px; padding:10px 0; text-decoration:none; color:inherit; border-top:1px solid rgba(255,255,255,.06); }
    .episode-item:first-child { border-top:0; }
    .episode-item img { width:132px; height:74px; object-fit:cover; border-radius:10px; flex:0 0 auto; }
    .episode-item .e-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .episode-item .e-sub { color:var(--muted); font-size:12px; }
    .related-item { display:flex; gap:12px; padding:10px 0; text-decoration:none; color:inherit; border-top:1px solid rgba(255,255,255,.06); }
    .related-item:first-child { border-top:0; }
    .related-item img { width:132px; height:74px; object-fit:cover; border-radius:10px; flex:0 0 auto; }
    .related-item .r-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .related-item .r-sub { color:var(--muted); font-size:12px; }
    @media(max-width:900px){ .watch-wrap{padding-left:16px;padding-right:16px;} .watch-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo-svg">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 18L8.5 7L13 14L16 10L21 18H3Z" fill="white" opacity="0.95"/></svg></div>
    <div class="logo-text">
      <div class="logo-wordmark">Gorkha<em>TV</em></div>
      <div class="logo-tagline">Darjeeling in Every Frame</div>
    </div>
  </a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="browse.html?cat=movie">Movies</a></li>
    <li><a href="browse.html?cat=webseries">Web Series</a></li>
    <li><a href="browse.html?cat=music">Music</a></li>
    <li><a href="browse.html?cat=documentary">Docs</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>
<div class="watch-wrap">
  <a href="javascript:history.back()" class="watch-back">← Back</a>
  <div id="watch-loading" class="loading"><div class="spinner"></div></div>
  <div id="watch-content" style="display:none;">
    <div class="watch-grid">
      <div>
        <div class="player-box" id="player-box"></div>
        <h1 class="video-title" id="video-title"></h1>
        <div class="video-meta" id="video-meta"></div>
        <div class="video-desc" id="video-desc"></div>
        <div class="series-box" id="series-box" style="display:none;">
          <h3 id="series-title"></h3>
          <div class="episode-list" id="episode-list"></div>
        </div>
      </div>
      <aside class="side-card">
        <h3>Related Videos</h3>
        <div id="related-list"></div>
      </aside>
    </div>
  </div>
</div>
<script type="module">
import { databases, account, DB_ID, COLLECTION_ID, Query } from '../js/appwrite.js';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
let currentUser = null;
try { currentUser = await account.get(); } catch {}
if (currentUser) document.getElementById('nav-right').innerHTML = `<div class="user-avatar" style="cursor:pointer;" onclick="window.location.href='/pages/my-favourites.html'">${currentUser.name[0].toUpperCase()}</div>`;
else document.getElementById('nav-right').innerHTML = `<button class="btn-signin" onclick="loginGoogle()">Sign In</button>`;
function ytUrlFromItem(item){
  if (item.youtube_id) return `https://www.youtube.com/embed/${item.youtube_id}?rel=0&modestbranding=1`;
  if (item.youtube_url) {
    const m = item.youtube_url.match(/(?:v=|youtu\.be\/|shorts\/)([A-Za-z0-9_-]{11})/);
    if (m) return `https://www.youtube.com/embed/${m[1]}?rel=0&modestbranding=1`;
  }
  return '';
}
async function load(){
  if (!id) { document.getElementById('watch-loading').innerHTML = '<p>Missing video ID.</p>'; return; }
  try {
    const item = await databases.getDocument(DB_ID, COLLECTION_ID, id);
    const embed = ytUrlFromItem(item);
    document.title = `${item.title || 'Watch'} — GorkhaTV`;
    document.getElementById('player-box').innerHTML = embed ? `<iframe src="${embed}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>` : `<div style="padding:24px;color:#fff;">Video link missing.</div>`;
    document.getElementById('video-title').textContent = item.title || '';
    const meta = [];
    if (item.category) meta.push(item.category);
    if (item.language) meta.push(item.language);
    if (item.location) meta.push(item.location);
    if (item.publishedAt) meta.push(new Date(item.publishedAt).toLocaleDateString());
    document.getElementById('video-meta').textContent = meta.join(' • ');
    document.getElementById('video-desc').textContent = item.description || '';

    if (item.seriesId) {
      const seriesRes = await databases.listDocuments(DB_ID, COLLECTION_ID, [
        Query.equal('seriesId', item.seriesId),
        Query.equal('status', 'published'),
        Query.orderAsc('publishedAt'),
        Query.limit(50)
      ]);
      const eps = seriesRes.documents;
      if (eps.length > 1) {
        document.getElementById('series-box').style.display = 'block';
        document.getElementById('series-title').textContent = item.seriesName ? `Series: ${item.seriesName}` : `Series: ${item.seriesId}`;
        document.getElementById('episode-list').innerHTML = eps.map(v => `
          <a class="episode-item" href="video.html?id=${v.$id}">
            <img src="${v.youtube_id ? `https://img.youtube.com/vi/${v.youtube_id}/hqdefault.jpg` : ''}" alt="${v.title || ''}">
            <div>
              <div class="e-title">${v.title || ''}</div>
              <div class="e-sub">${v.category || ''}${v.language ? ' • '+v.language : ''}${v.$id === item.$id ? ' • Playing now' : ''}</div>
            </div>
          </a>
        `).join('');
      }
    }

    const rel = await databases.listDocuments(DB_ID, COLLECTION_ID, [Query.equal('status','published'), Query.limit(8)]);
    const related = rel.documents.filter(x => x.$id !== item.$id).slice(0, 6);
    document.getElementById('related-list').innerHTML = related.map(v => `
      <a class="related-item" href="video.html?id=${v.$id}">
        <img src="${v.youtube_id ? `https://img.youtube.com/vi/${v.youtube_id}/hqdefault.jpg` : ''}" alt="${v.title || ''}">
        <div><div class="r-title">${v.title || ''}</div><div class="r-sub">${v.category || ''}${v.language ? ' • '+v.language : ''}</div></div>
      </a>
    `).join('');

    document.getElementById('watch-loading').style.display = 'none';
    document.getElementById('watch-content').style.display = 'block';
  } catch {
    document.getElementById('watch-loading').innerHTML = `<p>Could not load video.</p>`;
  }
}
window.loginGoogle = async () => {
  const { Account, Client } = await import('https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm');
  const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('6a280cbd0022eeb574a5');
  const acc = new Account(client);
  await acc.createOAuth2Session('google', window.location.origin + '/pages/auth-callback.html', window.location.href);
};
load();
</script>
</body>
</html>
