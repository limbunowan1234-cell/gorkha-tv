<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../logo-circle.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Browse</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GorkhaTV">
  <style>
    .browse-header { padding: 36px 48px 0; }
    .browse-title { font-family: 'Teko', sans-serif; font-size: 42px; font-weight: 600; }
    .browse-sub { color: var(--muted); font-size: 13px; margin-top: 4px; margin-bottom: 24px; }
    .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(196px, 1fr)); gap: 10px; padding: 0 48px 60px; }
    .card-ep-badge { position:absolute; bottom:8px; right:8px; background:rgba(196,30,58,0.95); color:#fff; font-size:10px; font-weight:700; padding:3px 7px; border-radius:3px; letter-spacing:0.5px; }
    .ep-list-title { font-family:'Teko',sans-serif; font-size:22px; margin:20px 0 12px; padding-top:18px; border-top:1px solid var(--border); }
    .ep-list { display:flex; flex-direction:column; gap:8px; }
    .ep-item { display:flex; gap:12px; align-items:center; padding:8px; border-radius:8px; cursor:pointer; transition:background 0.15s; }
    .ep-item:hover { background:var(--surface2); }
    .ep-item.playing { background:rgba(196,30,58,0.12); }
    .ep-thumb { position:relative; flex:0 0 auto; width:120px; height:68px; border-radius:6px; overflow:hidden; background:#000; }
    .ep-thumb img { width:100%; height:100%; object-fit:cover; }
    .ep-num { position:absolute; top:4px; left:4px; background:rgba(0,0,0,0.8); color:#fff; font-size:11px; font-weight:700; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border-radius:4px; }
    .ep-info { min-width:0; }
    .ep-title { font-size:14px; font-weight:600; margin-bottom:3px; }
    .ep-sub { font-size:12px; color:var(--muted); }
    @media(max-width:600px){ .browse-header,.browse-grid{padding-left:16px;padding-right:16px;} }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo-svg"><img src="../logo-horizantal.png" alt="GorkhaTV" class="nav-logo-img"></a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="browse.html?cat=movie">Movies</a></li>
    <li><a href="browse.html?cat=webseries">Web Series</a></li>
    <li><a href="browse.html?cat=music">Music</a></li>
    <li><a href="browse.html?cat=documentary">Docs</a></li>
    <li><a href="browse.html?cat=vlog">Vlogs</a></li>
    <li><a href="browse.html?cat=standup">Standup</a></li>
    <li><a href="browse.html?cat=podcast">Podcasts</a></li>
    <li><a href="browse.html?cat=prank">Pranks</a></li>
  </ul>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="cats-bar" id="cats-bar"></div>

<div class="browse-header">
  <h1 class="browse-title" id="browse-title">Browse</h1>
  <p class="browse-sub" id="browse-sub"></p>
</div>

<div class="browse-grid" id="browse-grid">
  <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-video" id="modal-video"></div>
    <div class="modal-body">
      <div class="modal-top">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-actions">
        <button class="modal-like-btn" id="modal-like-btn" onclick="modalLike()">🤍 Like</button>
        <button class="modal-fav-btn" id="modal-fav-btn" onclick="modalFav()">+ My List</button>
      </div>
      <div class="modal-meta" id="modal-meta"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div id="modal-claim"></div>
      <div id="modal-episodes" style="display:none;"></div>
    </div>
  </div>
</div>

<script type="module">
import { databases, account, DB_ID, COLLECTION_ID, LIKES_COLLECTION_ID, ID, Query } from '../js/appwrite.js';

const params = new URLSearchParams(window.location.search);
const cat = params.get('cat');
const featured = params.get('featured');
const labels = { movie:'Movies', webseries:'Web Series', music:'Music Videos', documentary:'Documentaries', vlog:'Vlogs', standup:'Standup Comedy', podcast:'Podcasts', prank:'Pranks' };

let currentUser = null;
let likes = JSON.parse(localStorage.getItem('gtv_likes') || '{}');
let favourites = JSON.parse(localStorage.getItem('gtv_favs') || '[]');
let modalItem = null;

try { currentUser = await account.get(); } catch {}

// ── View tracking (one view per browser per video) ──
const viewed = JSON.parse(localStorage.getItem('gtv_viewed') || '{}');
async function recordView(contentId) {
  if (!contentId || viewed[contentId]) return;
  viewed[contentId] = 1;
  localStorage.setItem('gtv_viewed', JSON.stringify(viewed));
  try {
    await databases.createDocument(DB_ID, LIKES_COLLECTION_ID, ID.unique(), { contentId, userId: currentUser?.$id || 'anon', type: 'view' });
  } catch (e) { console.error('view record failed', e); }
}

// Nav
if (currentUser) {
  document.getElementById('nav-right').innerHTML = `<div class="user-avatar" style="cursor:pointer;" onclick="window.location.href='/pages/my-favourites.html'">${currentUser.name[0].toUpperCase()}</div>`;
} else {
  document.getElementById('nav-right').innerHTML = `<button class="btn-signin" onclick="loginGoogle()">Sign In</button>`;
}

// Title
document.getElementById('browse-title').textContent = cat ? labels[cat] || cat : featured ? 'Featured' : 'All Content';
document.getElementById('browse-sub').textContent = cat ? `All ${labels[cat]||cat} on GorkhaTV` : 'Explore everything on GorkhaTV';

// Active nav
document.querySelectorAll('.nav-links a').forEach(a => { if (cat && a.href.includes(`cat=${cat}`)) a.classList.add('active'); });

// Category pills
const cats = ['all','movie','webseries','music','documentary','vlog','standup','podcast','prank'];
const catLabels = { all:'All', movie:'Movies', webseries:'Web Series', music:'Music', documentary:'Docs', vlog:'Vlogs', standup:'Standup', podcast:'Podcasts', prank:'Pranks' };
document.getElementById('cats-bar').innerHTML = cats.map(c =>
  `<a href="browse.html${c==='all'?'':'?cat='+c}" class="cat-pill ${(!cat&&c==='all')||(cat===c)?'active':''}">${catLabels[c]}</a>`
).join('');

// Holds grouped series: { seriesId: [episodes...] }
let seriesMap = {};

// Load
async function load() {
  const queries = [Query.equal('status','published'), Query.orderDesc('publishedAt'), Query.limit(100)];
  if (cat) queries.push(Query.equal('category', cat));
  if (featured) queries.push(Query.equal('featured', true));

  try {
    const res = await databases.listDocuments(DB_ID, COLLECTION_ID, queries);
    const grid = document.getElementById('browse-grid');
    if (!res.documents.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🎬</div><h3>Nothing here yet</h3><p style="color:var(--muted);font-size:14px;">Check back soon!</p></div>`;
      return;
    }

    // ── Group by series ──
    // Items with a seriesId get bundled; items without show individually.
    seriesMap = {};
    const singles = [];
    const seriesOrder = [];

    res.documents.forEach(item => {
      const sid = (item.seriesId || '').trim();
      if (sid) {
        if (!seriesMap[sid]) { seriesMap[sid] = []; seriesOrder.push(sid); }
        seriesMap[sid].push(item);
      } else {
        singles.push(item);
      }
    });

    // Sort episodes within each series oldest→newest (episode order)
    Object.keys(seriesMap).forEach(sid => {
      seriesMap[sid].sort((a,b) => new Date(a.publishedAt) - new Date(b.publishedAt));
    });

    const cards = [];

    // Series cards (one per group)
    seriesOrder.forEach(sid => {
      const eps = seriesMap[sid];
      const first = eps[0];
      const seriesName = first.seriesName || sid;
      const cover = eps.find(e => e.youtube_id)?.youtube_id || first.youtube_id;
      cards.push(`
        <div class="card" onclick="openSeries('${sid.replace(/'/g,"\\'")}')">
          <div class="card-thumb">
            <img src="https://img.youtube.com/vi/${cover}/hqdefault.jpg" alt="${seriesName}" loading="lazy">
            <div class="card-play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24" fill="black" width="18" height="18"><path d="M8 5v14l11-7z"/></svg></div></div>
            <span class="card-cat-badge">${first.category}</span>
            <span class="card-ep-badge">${eps.length} EP${eps.length>1?'S':''}</span>
          </div>
          <div class="card-body">
            <div class="card-title">${seriesName}</div>
            <div class="card-sub">Series · ${first.language||''} ${first.location?'· '+first.location:''}</div>
          </div>
        </div>`);
    });

    // Single video cards
    singles.forEach(item => {
      const isLiked = !!likes[item.$id];
      const likeCount = likes[item.$id] || 0;
      cards.push(`
        <div class="card" onclick='openModal(${JSON.stringify(item).replace(/'/g,"&#39;")})'>
          <div class="card-thumb">
            <img src="https://img.youtube.com/vi/${item.youtube_id}/hqdefault.jpg" alt="${item.title}" loading="lazy">
            <div class="card-play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24" fill="black" width="18" height="18"><path d="M8 5v14l11-7z"/></svg></div></div>
            <span class="card-cat-badge">${item.category}</span>
            <button class="card-like-btn ${isLiked?'liked':''}" onclick="event.stopPropagation();quickLike('${item.$id}',this)">
              ${isLiked?'❤️':'🤍'} ${likeCount>0?likeCount:''}
            </button>
          </div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-sub">${item.language||''} ${item.location?'· '+item.location:''}</div>
          </div>
        </div>`);
    });

    grid.innerHTML = cards.join('');
  } catch { document.getElementById('browse-grid').innerHTML = `<p style="color:var(--muted);grid-column:1/-1">Could not load content.</p>`; }
}

// Open a series: play first episode + list all episodes in the modal
window.openSeries = (sid) => {
  const eps = seriesMap[sid];
  if (!eps || !eps.length) return;
  openModal(eps[0], sid);
};

window.quickLike = (id, btn) => {
  if (!currentUser) { alert('Sign in to like content'); return; }
  const isLiked = !!likes[id];
  if (isLiked) { delete likes[id]; btn.innerHTML='🤍'; btn.classList.remove('liked'); }
  else { likes[id]=1; btn.innerHTML='❤️ 1'; btn.classList.add('liked'); }
  localStorage.setItem('gtv_likes', JSON.stringify(likes));
};

window.openModal = (item, seriesId = null) => {
  if (typeof item === 'string') item = JSON.parse(item);
  modalItem = item;
  recordView(item.$id);
  document.getElementById('modal-video').innerHTML = `<iframe src="https://www.youtube.com/embed/${item.youtube_id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;
  document.getElementById('modal-title').textContent = item.title;
  document.getElementById('modal-desc').textContent = item.description || '';
  const meta = [];
  if (item.director) meta.push(`<span><strong>Director:</strong> ${item.director}</span>`);
  if (item.cast) meta.push(`<span><strong>Cast:</strong> ${item.cast}</span>`);
  if (item.language) meta.push(`<span><strong>Language:</strong> ${item.language}</span>`);
  if (item.location) meta.push(`<span><strong>Location:</strong> ${item.location}</span>`);
  document.getElementById('modal-meta').innerHTML = meta.join('');
  const isLiked = !!likes[item.$id];
  document.getElementById('modal-like-btn').className = `modal-like-btn ${isLiked?'liked':''}`;
  document.getElementById('modal-like-btn').innerHTML = `${isLiked?'❤️':'🤍'} ${isLiked?'Liked':'Like'}`;
  const isFav = favourites.some(f => f.$id === item.$id);
  document.getElementById('modal-fav-btn').className = `modal-fav-btn ${isFav?'saved':''}`;
  document.getElementById('modal-fav-btn').innerHTML = isFav ? '🔖 Saved' : '+ My List';
  document.getElementById('modal-claim').innerHTML = currentUser && (item.cast||item.director)
    ? `<button class="claim-btn" onclick="alert('Credit claim submitted! Admin will verify soon. ⭐')">⭐ I worked on this</button>` : '';

  // Episode list (only when opened from a series)
  const epWrap = document.getElementById('modal-episodes');
  const sid = seriesId || (item.seriesId || '').trim();
  if (sid && seriesMap[sid] && seriesMap[sid].length > 1) {
    const eps = seriesMap[sid];
    const seriesName = eps[0].seriesName || sid;
    epWrap.innerHTML = `
      <div class="ep-list-title">${seriesName} — ${eps.length} Episodes</div>
      <div class="ep-list">
        ${eps.map((ep, i) => `
          <div class="ep-item ${ep.$id===item.$id?'playing':''}" onclick='playEpisode(${JSON.stringify(ep).replace(/'/g,"&#39;")}, "${sid.replace(/"/g,'')}")'>
            <div class="ep-thumb">
              <img src="https://img.youtube.com/vi/${ep.youtube_id}/default.jpg" alt="">
              <span class="ep-num">${i+1}</span>
            </div>
            <div class="ep-info">
              <div class="ep-title">${ep.title}</div>
              <div class="ep-sub">${ep.$id===item.$id ? '▶ Now playing' : 'Tap to play'}</div>
            </div>
          </div>
        `).join('')}
      </div>`;
    epWrap.style.display = 'block';
  } else {
    epWrap.innerHTML = '';
    epWrap.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

// Switch episode within the open series modal
window.playEpisode = (ep, sid) => {
  if (typeof ep === 'string') ep = JSON.parse(ep);
  openModal(ep, sid);
  document.querySelector('.modal').scrollTop = 0;
};

window.closeModal = () => {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-video').innerHTML = '';
  document.body.style.overflow = '';
};

window.modalLike = () => {
  if (!currentUser || !modalItem) return;
  const isLiked = !!likes[modalItem.$id];
  if (isLiked) { delete likes[modalItem.$id]; } else { likes[modalItem.$id] = 1; }
  localStorage.setItem('gtv_likes', JSON.stringify(likes));
  const btn = document.getElementById('modal-like-btn');
  const nowLiked = !!likes[modalItem.$id];
  btn.className = `modal-like-btn ${nowLiked?'liked':''}`;
  btn.innerHTML = `${nowLiked?'❤️':'🤍'} ${nowLiked?'Liked':'Like'}`;
};

window.modalFav = () => {
  if (!currentUser || !modalItem) return;
  const idx = favourites.findIndex(f => f.$id === modalItem.$id);
  if (idx === -1) { favourites.push(modalItem); }
  else { favourites.splice(idx, 1); }
  localStorage.setItem('gtv_favs', JSON.stringify(favourites));
  const isFav = favourites.some(f => f.$id === modalItem.$id);
  const btn = document.getElementById('modal-fav-btn');
  btn.className = `modal-fav-btn ${isFav?'saved':''}`;
  btn.innerHTML = isFav ? '🔖 Saved' : '+ My List';
};

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.loginGoogle = async () => {
  const { Account, Client } = await import('https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm');
  const client = new Client().setEndpoint('https://nyc.cloud.appwrite.io/v1').setProject('6a280cbd0022eeb574a5');
  const acc = new Account(client);
  await acc.createOAuth2Session('google', window.location.origin + '/pages/auth-callback.html', window.location.href);
};

load();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('[GorkhaTV] Service worker registered'))
        .catch((err) => console.warn('[GorkhaTV] SW registration failed', err));
    });
  }
</script>
</body>
</html>
