<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GorkhaTV — Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-wrap { max-width: 880px; margin: 40px auto; padding: 0 24px; }
    .admin-title { font-family: 'Teko', sans-serif; font-size: 34px; margin-bottom: 6px; }
    .admin-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; }
    .stat-num { font-family: 'Teko', sans-serif; font-size: 40px; line-height: 1; color: var(--red); }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 6px; }
    .stat-num.gold { color: var(--gold); }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 16px; }
    .hub-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 26px; text-decoration: none; color: inherit; transition: all 0.2s; display: block; }
    .hub-card:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.4); }
    .hub-icon { font-size: 34px; margin-bottom: 12px; }
    .hub-title { font-family: 'Teko', sans-serif; font-size: 24px; margin-bottom: 6px; }
    .hub-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .hub-badge { display:inline-block; background: var(--gold); color:#000; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; margin-top:10px; }
    .access-denied { text-align: center; padding: 100px 24px; }
    .access-denied h2 { font-family: 'Teko', sans-serif; font-size: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo-svg">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M3 18L8.5 7L13 14L16 10L21 18H3Z" fill="white" opacity="0.95"/></svg></div>
    <div class="logo-text">
      <div class="logo-wordmark">Gorkha<em>TV</em></div>
      <div class="logo-tagline">Darjeeling in Every Frame</div>
    </div>
  </a>
  <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Admin Dashboard</div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div id="page-wrap"><div class="loading"><div class="spinner"></div></div></div>

<script type="module">
import { databases, account, DB_ID, COLLECTION_ID, CLAIMS_COLLECTION_ID, ADMIN_EMAIL, Query } from '../js/appwrite.js';

let user = null;
try {
  user = await account.get();
} catch {
  document.getElementById('page-wrap').innerHTML = `<div class="access-denied"><h2>Sign in required</h2><a href="/" style="color:var(--red);">← Back to GorkhaTV</a></div>`;
  throw new Error('Not logged in');
}

if (user.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
  document.getElementById('page-wrap').innerHTML = `
    <div class="access-denied">
      <div style="font-size:56px;margin-bottom:16px;">🔒</div>
      <h2>Access Denied</h2>
      <p style="color:var(--muted);font-size:14px;">This page is only for the site administrator.</p>
      <a href="/" style="display:inline-block;margin-top:20px;color:var(--red);font-size:14px;">← Back to GorkhaTV</a>
    </div>`;
  throw new Error('Not admin');
}

document.getElementById('nav-right').innerHTML = `<span style="font-size:13px;color:var(--muted);">${user.name}</span>`;

// Quick stats
let totalContent = 0, totalPublished = 0, pendingClaims = 0;
try {
  const [allC, pubC, pendC] = await Promise.all([
    databases.listDocuments(DB_ID, COLLECTION_ID, [Query.limit(1)]),
    databases.listDocuments(DB_ID, COLLECTION_ID, [Query.equal('status','published'), Query.limit(1)]),
    databases.listDocuments(DB_ID, CLAIMS_COLLECTION_ID, [Query.equal('status','pending'), Query.limit(1)])
  ]);
  totalContent = allC.total; totalPublished = pubC.total; pendingClaims = pendC.total;
} catch(e) { console.error(e); }

document.getElementById('page-wrap').innerHTML = `
<div class="admin-wrap">
  <h1 class="admin-title">🛠 Admin Dashboard</h1>
  <p class="admin-sub">Welcome back, ${user.name}</p>

  <div class="stat-row">
    <div class="stat-card"><div class="stat-num">${totalContent}</div><div class="stat-label">Total Videos</div></div>
    <div class="stat-card"><div class="stat-num">${totalPublished}</div><div class="stat-label">Published</div></div>
    <div class="stat-card"><div class="stat-num gold">${pendingClaims}</div><div class="stat-label">Pending Claims</div></div>
  </div>

  <div class="hub-grid">
    <a href="admin-content.html" class="hub-card">
      <div class="hub-icon">🎬</div>
      <div class="hub-title">Add / Edit Videos</div>
      <div class="hub-desc">Upload new content, edit details, manage genres, or delete videos from the gallery.</div>
    </a>
    <a href="admin-claims.html" class="hub-card">
      <div class="hub-icon">⭐</div>
      <div class="hub-title">Credit Claims</div>
      <div class="hub-desc">Review artists claiming credits. Approve, reject, or delete claims.</div>
      ${pendingClaims > 0 ? `<span class="hub-badge">${pendingClaims} pending</span>` : ''}
    </a>
  </div>
</div>`;
</script>
</body>
</html>
